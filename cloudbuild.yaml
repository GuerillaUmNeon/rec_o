# Build/push: no secrets in the image (layers would leak them).
# Deploy: Cloud Run mounts Secret Manager values as env vars at container startup.
options:
  logging: CLOUD_LOGGING_ONLY

steps:

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - europe-west1-docker.pkg.dev/rec-o-gcp/rec-o/rec-o:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-west1-docker.pkg.dev/rec-o-gcp/rec-o/rec-o:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - rec-o-api
      - --image=europe-west1-docker.pkg.dev/rec-o-gcp/rec-o/rec-o:$COMMIT_SHA
      - --region=europe-west1
      - --allow-unauthenticated
      - --port=8000
      - --vpc-connector=rec-o-connector
      - --vpc-egress=all-traffic
      # One-time migration: Cloud Run cannot switch a var from literal env → secret in one step.
      - --remove-env-vars=TOKEN_API_KEY,POSTGRES,DATABASE,DB_USERNAME,DB_PASSWORD,DB_PORT,DATABASE_URL,MODEL_BUCKET_NAME,ARTIST_MODEL_BLOB_NAME,RELEASE_GROUP_MODEL_BLOB_NAME
      - --set-secrets=TOKEN_API_KEY=TOKEN_API_KEY:latest,POSTGRES=POSTGRES:latest,DATABASE=DATABASE:latest,DB_USERNAME=DB_USERNAME:latest,DB_PASSWORD=DB_PASSWORD:latest,DB_PORT=DB_PORT:latest,DATABASE_URL=DATABASE_URL:latest,MODEL_BUCKET_NAME=MODEL_BUCKET_NAME:latest,ARTIST_MODEL_BLOB_NAME=ARTIST_MODEL_BLOB_NAME:latest,RELEASE_GROUP_MODEL_BLOB_NAME=RELEASE_GROUP_MODEL_BLOB_NAME:latest
