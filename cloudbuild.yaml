# Build/push: no secrets in the image (layers would leak them).
# Deploy: Cloud Run mounts Secret Manager values as env vars at container startup.
# Manual test: gcloud builds submit --config=cloudbuild.yaml --region=europe-west1 .
# (GitHub trigger on main is already configured for europe-west1 — not global.)
options:
  logging: CLOUD_LOGGING_ONLY

steps:

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - europe-west1-docker.pkg.dev/rec-o-gcp/rec-o/rec-o:$BUILD_ID
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-west1-docker.pkg.dev/rec-o-gcp/rec-o/rec-o:$BUILD_ID

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - rec-o-api
      - --image=europe-west1-docker.pkg.dev/rec-o-gcp/rec-o/rec-o:$BUILD_ID
      - --region=europe-west1
      - --allow-unauthenticated
      - --port=8000
      - --memory=8Gi
      - --cpu=2
      - --vpc-connector=rec-o-connector
      - --vpc-egress=all-traffic
      - --set-secrets=TOKEN_API_KEY=TOKEN_API_KEY:latest,POSTGRES=POSTGRES:latest,DATABASE=DATABASE:latest,DB_USERNAME=DB_USERNAME:latest,DB_PASSWORD=DB_PASSWORD:latest,DB_PORT=DB_PORT:latest,DATABASE_URL=DATABASE_URL:latest,MODEL_BUCKET_NAME=MODEL_BUCKET_NAME:latest,ARTIST_MODEL_BLOB_NAME=ARTIST_MODEL_BLOB_NAME:latest,RELEASE_GROUP_MODEL_BLOB_NAME=RELEASE_GROUP_MODEL_BLOB_NAME:latest
      - --update-env-vars=LISTENBRAINZ_URL=https://api.listenbrainz.org
